name: Refresh Instagram Token

on:
  schedule:
    # Run every 50 days to keep the 60-day long-lived token fresh
    - cron: "0 10 */50 * *"
  workflow_dispatch: {}

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Refresh long-lived Instagram token
        env:
          INSTAGRAM_ACCESS_TOKEN: ${{ secrets.INSTAGRAM_ACCESS_TOKEN }}
        run: |
          python3 - <<'EOF'
          import urllib.request
          import urllib.parse
          import json
          import os

          token = os.environ["INSTAGRAM_ACCESS_TOKEN"]
          url = (
              "https://graph.instagram.com/refresh_access_token"
              f"?grant_type=ig_refresh_token&access_token={token}"
          )
          with urllib.request.urlopen(url, timeout=15) as resp:
              data = json.loads(resp.read())
          expires_in = data.get("expires_in", 0)
          new_token = data.get("access_token", "")
          print(f"Token refreshed. Expires in {expires_in // 86400} days.")
          print(f"New token (first 20 chars): {new_token[:20]}...")
          print()
          print("ACTION REQUIRED: Update the INSTAGRAM_ACCESS_TOKEN secret in GitHub")
          print("Settings → Secrets → Actions → INSTAGRAM_ACCESS_TOKEN")
          print(f"New value: {new_token}")
          EOF

      - name: Reminder to update secret
        run: |
          echo "::warning::Check workflow logs — update INSTAGRAM_ACCESS_TOKEN secret if it changed"
