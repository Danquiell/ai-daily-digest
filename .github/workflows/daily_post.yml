name: AI Daily Digest

# ── Scheduling ────────────────────────────────────────────────────────────────
# Target: 06:00 BRT (UTC-3) = 09:00 UTC
# Note: GitHub's schedule trigger can be delayed 2-3h on free plans.
#
# For reliable 06:00 BRT timing, use cron-job.org (free) to trigger via API:
#   URL:    POST https://api.github.com/repos/Danquiell/ai-daily-digest/actions/workflows/daily_post.yml/dispatches
#   Body:   {"ref":"main"}
#   Header: Authorization: Bearer <GH_TOKEN>
#   Schedule: 0 9 * * * (09:00 UTC daily)
#
# The schedule below runs as fallback if the external trigger is not configured.
# ──────────────────────────────────────────────────────────────────────────────
on:
  schedule:
    # Target: 06:00 BRT (= 09:00 UTC). GitHub's docs warn that scheduled workflows
    # are delayed during high load and that "high load times include the start of
    # every hour". We use odd minutes (smaller runner queue) and six attempts in a
    # ~1h45 window. main.py exits cleanly if today is already in history.json, so
    # duplicate firings are safe.
    - cron: "3 9 * * *"     # 06:03 BRT
    - cron: "17 9 * * *"    # 06:17 BRT
    - cron: "33 9 * * *"    # 06:33 BRT
    - cron: "47 9 * * *"    # 06:47 BRT
    - cron: "11 10 * * *"   # 07:11 BRT (fallback)
    - cron: "41 10 * * *"   # 07:41 BRT (fallback)
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Run without posting (dry run)"
        required: false
        default: "false"
        type: boolean

jobs:
  post:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_TOKEN }}
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run AI Daily Digest
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          LINKEDIN_ACCESS_TOKEN: ${{ secrets.LINKEDIN_ACCESS_TOKEN }}
          LINKEDIN_PERSON_URN: ${{ secrets.LINKEDIN_PERSON_URN }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          FLAGS=""
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            FLAGS="--dry-run"
          fi
          python src/main.py $FLAGS

      - name: Upload card preview (on failure or dry run)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: linkedin-card-${{ github.run_id }}
          path: output/*.jpg
          retention-days: 7
          if-no-files-found: ignore
